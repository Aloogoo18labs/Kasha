<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kasha — meowster console</title>
    <meta name="color-scheme" content="dark light" />
    <style>
      :root {
        --bg: #0b0e14;
        --panel: #111827;
        --panel2: #0f172a;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --ok: #22c55e;
        --warn: #f59e0b;
        --bad: #ef4444;
        --accent: #7c3aed;
        --accent2: #06b6d4;
        --border: rgba(148, 163, 184, 0.18);
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f7fb;
          --panel: #ffffff;
          --panel2: #fbfcff;
          --text: #0b1220;
          --muted: #64748b;
          --border: rgba(100, 116, 139, 0.22);
          --shadow: 0 10px 26px rgba(15, 23, 42, 0.12);
        }
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        background: radial-gradient(1200px 500px at 10% 0%, rgba(124, 58, 237, 0.14), transparent),
          radial-gradient(900px 540px at 90% 10%, rgba(6, 182, 212, 0.12), transparent), var(--bg);
        color: var(--text);
        font-family: var(--sans);
        letter-spacing: 0.1px;
      }
      a {
        color: inherit;
      }
      .wrap {
        max-width: 1220px;
        margin: 0 auto;
        padding: 24px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        background: linear-gradient(135deg, rgba(124, 58, 237, 1), rgba(6, 182, 212, 1));
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }
      .logo:before {
        content: "";
        position: absolute;
        inset: -30%;
        background: radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.35), transparent 55%);
        transform: rotate(14deg);
      }
      .title {
        display: flex;
        flex-direction: column;
        line-height: 1.1;
      }
      .title b {
        font-size: 16px;
      }
      .title span {
        color: var(--muted);
        font-size: 12px;
        font-family: var(--mono);
      }
      .topbar {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
        align-items: center;
      }
      .pill {
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        padding: 8px 10px;
        border-radius: 999px;
        display: flex;
        gap: 10px;
        align-items: center;
        box-shadow: var(--shadow);
      }
      .pill strong {
        font-family: var(--mono);
        font-size: 12px;
      }
